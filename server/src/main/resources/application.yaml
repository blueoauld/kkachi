server:
  port: 8080

spring:
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/kkachi
    username: root
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        highlight_sql: true
    open-in-view: false
  data:
    redis:
      port: 6379
      host: localhost
      password:
  config:
    import: optional:file:.env[.properties]

app:
  crypto:
    secret-key: ${APP_CRYPTO_SECRET_KEY:local-dev-secret-key}

jwt:
  secret: ${JWT_SECRET:local-dev-jwt-secret-please-change-this-to-a-long-random-value-0123456789}
  access-token-expiration: 1800000 # 30분 (ms)
  refresh-token-expiration: 1209600000 # 14일 (ms)

discord:
  bot:
    enabled: ${DISCORD_BOT_ENABLED:false}
    token: ${DISCORD_BOT_TOKEN}
    guild-id: ${DISCORD_GUILD_ID}

r2:
  endpoint: ${R2_ENDPOINT}
  access-key: ${R2_ACCESS_KEY}
  secret-key: ${R2_SECRET_KEY}
  bucket: ${R2_BUCKET}
  presigned-url-expiration: 300000 # 업로드 5분 (ms)
  presigned-download-url-expiration: 1800000 # 다운로드 30분 (ms)